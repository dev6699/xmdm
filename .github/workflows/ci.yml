name: ci

on:
  push:
    branches:
      - master
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  docs:
    name: Docs Link And Lint Checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Check docs links and style
        run: node scripts/check-doc-links.mjs

  server-unit:
    name: Full Server Tests Excluding E2E
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: server/go.mod
          cache-dependency-path: server/go.sum

      - name: Run full server tests
        run: |
          cd infra
          eval "$(./test-db-env.sh)"
          test -n "${XMDM_TEST_POSTGRES_DSN:-}"
          cd ../server
          GOCACHE=/tmp/go-build go test -p 1 -count=1 $(go list ./... | grep -v '/e2e$')

  server-build:
    name: Server Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: server/go.mod
          cache-dependency-path: server/go.sum

      - name: Build server binary
        run: cd server && CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -trimpath -ldflags="-s -w" ./cmd/server

  android-unit:
    name: Android Unit Tests
    runs-on: ubuntu-latest
    env:
      GRADLE_USER_HOME: /tmp/xmdm-gradle
    steps:
      - uses: actions/checkout@v7

      - name: Prepare Gradle cache directories
        run: mkdir -p "$GRADLE_USER_HOME/caches" "$GRADLE_USER_HOME/wrapper"

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Run Android unit tests
        working-directory: app
        run: ./gradlew testDebugUnitTest

  android-debug-build:
    name: Android Debug Build
    runs-on: ubuntu-latest
    env:
      GRADLE_USER_HOME: /tmp/xmdm-gradle
    steps:
      - uses: actions/checkout@v7

      - name: Prepare Gradle cache directories
        run: mkdir -p "$GRADLE_USER_HOME/caches" "$GRADLE_USER_HOME/wrapper"

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Build Android debug artifact
        working-directory: app
        run: ./gradlew assembleDebug

  playwright-dashboard:
    name: Playwright Dashboard Tests
    runs-on: ubuntu-latest
    env:
      GOCACHE: /tmp/go-build
    steps:
      - uses: actions/checkout@v7

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: playwright/package-lock.json

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: server/go.mod
          cache-dependency-path: server/go.sum

      - name: Install Playwright dependencies
        working-directory: playwright
        run: npm ci

      - name: Install Chromium
        working-directory: playwright
        run: npx playwright install --with-deps chromium

      - name: Run dashboard browser tests
        working-directory: playwright
        run: npm test
