name: ci

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  docs-validate:
    name: Docs Validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Verify blueprint and snapshot files exist
        run: |
          test -f blueprint/README.md
          test -f blueprint/09-roadmap-checklist.md
          test -f README.md
      - name: Verify roadmap snapshot is present
        run: |
          grep -q "M0-05 CI Skeleton" README.md

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check repository formatting hygiene
        run: git diff --check

  tests:
    name: Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Placeholder test gate
        run: |
          echo "Test targets will be added when implementation code lands."

  build-verify:
    name: Build Verify
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Placeholder build gate
        run: |
          echo "Build targets will be added when app and server modules exist."
