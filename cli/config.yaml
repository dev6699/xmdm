# XMDM CLI configuration

defaultProfile: local
defaultFormat: table
defaultTimeout: 30s

profiles:
  local:
    baseUrl: "http://127.0.0.1:8080/api/v1"
    authMode: session
    outputFormat: table
    timeout: 30s
  lab:
    baseUrl: "https://mdm.example/api/v1"
    authMode: session
    outputFormat: json
    timeout: 15s
