services:
  postgres:
    image: postgres:16.13-bookworm
    environment:
      POSTGRES_DB: xmdm
      POSTGRES_USER: xmdm
      POSTGRES_PASSWORD: xmdm
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

  object-storage:
    image: chrislusf/seaweedfs:4.20
    command: server -dir=/data -s3
    ports:
      - "8333:8333"
    volumes:
      - seaweed-data:/data

  mqtt:
    image: eclipse-mosquitto:2.1.2-alpine
    environment:
      MOSQUITTO_DYNSEC_PASSWORD: xmdm-admin
      XMDM_MQTT_USERNAME: xmdm-server
      XMDM_MQTT_PASSWORD: xmdm-server-secret
    command: ["/bin/sh", "/mosquitto-entrypoint.sh"]
    ports:
      - "1883:1883"
    volumes:
      - ./mosquitto/mosquitto-entrypoint.sh:/mosquitto-entrypoint.sh:ro
      - mqtt-data:/mosquitto/data

volumes:
  postgres-data:
  seaweed-data:
  mqtt-data:
