services:
  postgres:
    image: postgres:16.13-bookworm
    environment:
      POSTGRES_DB: xmdm
      POSTGRES_USER: xmdm
      POSTGRES_PASSWORD: xmdm
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

  object-storage:
    image: chrislusf/seaweedfs:4.20
    command: server -dir=/data -s3
    ports:
      - "8333:8333"
    volumes:
      - seaweed-data:/data

  mqtt:
    image: eclipse-mosquitto:2.1.2-alpine
    ports:
      - "1883:1883"

volumes:
  postgres-data:
  seaweed-data:
